baseURL = 'https://clawhive.io/'
languageCode = 'en-us'
title = 'ClawHive'

# Enable Git info for lastmod
enableGitInfo = false

# Syntax highlighting
pygmentsUseClasses = false
pygmentsCodeFences = true
pygmentsStyle = "monokai"

# Number of posts per page
[pagination]
  pagerSize = 10

# Markup settings
[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    noClasses = false

# Hugo Modules
[module]
  [module.hugoVersion]
    extended = true
    min = "0.120.0"
  [[module.imports]]
    path = "github.com/google/docsy"
    disable = false
  [[module.imports]]
    path = "github.com/FortAwesome/Font-Awesome"
    disable = false

# Top-level navigation
[[menu.main]]
  name = "Docs"
  weight = 10
  url = "/docs/"
  pre = "<i class='fas fa-book'></i>"

[[menu.main]]
  name = "GitHub"
  weight = 20
  url = "https://github.com/clawhive/clawhive"
  pre = "<i class='fab fa-github'></i>"

# Documentation section (left sidebar)
[[menu.main]]
  name = "Home"
  parent = "Docs"
  weight = 10
  url = "/docs/"

[[menu.main]]
  name = "Getting Started"
  parent = "Docs"
  weight = 20
  url = "/docs/getting-started/"

[[menu.main]]
  name = "Concepts"
  parent = "Docs"
  weight = 30
  url = "/docs/concepts/"

[[menu.main]]
  name = "Configuration"
  parent = "Docs"
  weight = 40
  url = "/docs/configuration/"

[[menu.main]]
  name = "Tools"
  parent = "Docs"
  weight = 50
  url = "/docs/tools/"

[[menu.main]]
  name = "Protocols"
  parent = "Docs"
  weight = 60
  url = "/docs/protocols/"

[[menu.main]]
  name = "Kubernetes"
  parent = "Docs"
  weight = 70
  url = "/docs/kubernetes/"

# Params for Docsy theme
[params]
  copyright = "ClawHive Authors"
  privacy_policy = ""
  version_menu = "Releases"

  # GitHub link
  github_repo = "https://github.com/clawhive/clawhive"
  github_project_repo = "https://github.com/clawhive/clawhive"

  # UI customization
  [params.ui]
    sidebar_menu_compact = true
    breadcrumb_disable = false

  # Links format
  links = []
